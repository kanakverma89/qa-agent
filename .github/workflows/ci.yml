name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only (non-blocking)
          flake8 . --count --exit-zero --max-line-length=120 --statistics

      - name: Check imports
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_URL: "https://example.com"
          OUTPUT_FILE: "output/test_cases.xlsx"
        run: |
          python -c "from crawler.scraper import scrape_website"
          python -c "from ai.claude_generator import generate_test_cases"
          python -c "from utils.exporter import export_to_excel"
          python -c "from config import TARGET_URL, OUTPUT_FILE"
